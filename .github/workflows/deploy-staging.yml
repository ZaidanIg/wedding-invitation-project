name: 🚀 Deploy — Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:


# Batalkan run lama jika ada push baru ke branch yang sama
concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: sahinaja
          POSTGRES_DB: sahinajadb
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Validate Prisma Schema
        run: npx prisma validate

      - name: 🔍 Lint Check
        run: npm run lint

      - name: 🛡️ Type Check
        run: npm run type-check

      - name: 🗄️ Setup Test Database
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:sahinaja@localhost:5435/sahinajadb"

      - name: 🧪 Run Unit Tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: "postgresql://postgres:sahinaja@localhost:5435/sahinajadb"
          NEXTAUTH_SECRET: "ci-test-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          NODE_ENV: "test"

      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull env vars dan konfigurasi Vercel dari cloud (untuk env staging)
      - name: 📡 Pull Vercel Environment (Staging)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Debug: verifikasi NEXT_PUBLIC vars ada di pulled env
      - name: 🔍 Debug — Verify Pulled Env
        run: |
          echo "=== Checking pulled env files ==="
          ls -la .vercel/ 2>/dev/null || echo ".vercel dir not found"
          echo "--- NEXT_PUBLIC vars in preview env ---"
          grep -i "NEXT_PUBLIC" .vercel/.env.preview.local 2>/dev/null | sed 's/=.*/=[REDACTED]/' || echo "No NEXT_PUBLIC vars found in pulled env!"

      # Deploy source code ke Vercel (Build dijalankan di server Vercel)
      - name: 🌐 Deploy to Vercel (Staging)
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Deployment Summary
        run: |
          echo "### 🚀 Staging Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
