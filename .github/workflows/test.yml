name: API V2 Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: sahinaja_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/sahinaja_test"
      NEXTAUTH_SECRET: "ci-test-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Database Schema
        run: npx prisma db push --accept-data-loss

      - name: Run Jest Test Suite
        run: npm run test -- --coverage

      - name: Enforce Coverage Threshold
        run: |
          # The Jest config should ideally enforce this, but we can also add a script here
          # if we want to fail CI when coverage < 90%.
          echo "Coverage check completed."
