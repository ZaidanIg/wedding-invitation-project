name: 🏁 Deploy — Production

on:
  push:
    branches:
      - main
  workflow_dispatch:


# Batalkan run lama jika ada push baru ke branch yang sama
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Lint Check
        run: npm run lint

      - name: 🧪 Run Unit Tests
        run: npm run test -- --passWithNoTests

      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull env vars dan konfigurasi production dari Vercel cloud
      - name: 📡 Pull Vercel Environment (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build dijalankan di GitHub runner — TIDAK memakan Vercel Build Minutes
      - name: 🏗️ Build Project (on GitHub Runner)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy artefak hasil build ke Vercel production (pre-built, 0 Vercel Build Minutes)
      - name: 🏁 Deploy Pre-built to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Deployment Summary
        run: |
          echo "### 🏁 Production Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
