name: 🏁 Deploy — Production

on:
  push:
    branches:
      - main
  workflow_dispatch:


# Batalkan run lama jika ada push baru ke branch yang sama
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Build & Deploy to Production (Netlify)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🗄️ Validate Prisma Schema
        run: npx prisma validate

      - name: 🔍 Lint Check
        run: npm run lint

      - name: 🛡️ Type Check
        run: npm run type-check

      - name: 🧪 Run Unit Tests
        run: npm run test -- --passWithNoTests

      - name: 🔧 Install Netlify CLI
        run: npm install --global netlify-cli

      # Build & Deploy to Netlify
      - name: 🏁 Build & Deploy to Netlify (Production)
        id: deploy
        run: |
          netlify deploy --build --prod > deploy_output.txt
          cat deploy_output.txt
          # Extract URL from output if possible, fallback to Netlify general URL
          url=$(grep "Website URL:" deploy_output.txt | awk '{print $3}')
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: ✅ Deployment Summary
        run: |
          echo "### 🏁 Production Deployed to Netlify!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
