# 1. Redirect HTTP to HTTPS (for all domains)
server {
    listen 80;
    listen [::]:80;
    server_name sahinaja.com www.sahinaja.com admin.sahinaja.com;

    # Redirect to HTTPS version
    return 301 https://$host$request_uri;
}

# 2. Redirect www.sahinaja.com (HTTPS) to apex sahinaja.com (HTTPS) for SEO consistency
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sahinaja.com;

    # SSL Certificates (Set up Cloudflare Origin Certs or Let's Encrypt Certbot)
    ssl_certificate /etc/ssl/certs/sahinaja.pem;
    ssl_certificate_key /etc/ssl/private/sahinaja.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://sahinaja.com$request_uri;
}

# 3. Main Client Domain: sahinaja.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sahinaja.com;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/sahinaja.pem;
    ssl_certificate_key /etc/ssl/private/sahinaja.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/sahinaja.access.log;
    error_log /var/log/nginx/sahinaja.error.log;

    # Next.js Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 4. Admin Portal Subdomain: admin.sahinaja.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.sahinaja.com;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/sahinaja.pem;
    ssl_certificate_key /etc/ssl/private/sahinaja.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/admin_sahinaja.access.log;
    error_log /var/log/nginx/admin_sahinaja.error.log;

    # Next.js Reverse Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
