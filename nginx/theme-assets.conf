# Konfigurasi Nginx untuk Penyimpanan Aset Tema Sahinaja
#
# Petunjuk:
# Letakkan blok lokasi (location block) di bawah ini di dalam SERVER BLOCK (port 443) 
# pada file konfigurasi Nginx server Anda (sahinaja.nginx.conf) baik untuk domain 
# sahinaja.com maupun subdomain admin.sahinaja.com.
#
# Pastikan folder target eksternal sudah ada dengan menjalankan perintah:
# sudo mkdir -p /var/www/sahinaja-uploads/theme-assets/
# sudo chown -R www-data:www-data /var/www/sahinaja-uploads/

location /uploads/theme-assets/ {
    # Path folder penyimpanan fisik di server (di luar folder aplikasi)
    alias /var/www/sahinaja-uploads/theme-assets/;

    # Cache Browser: Simpan aset di browser pengguna selama 1 tahun (365 hari)
    expires 365d;
    
    # Header Cache: Tandai sebagai publik, tidak boleh diubah (immutable), dan optimal
    add_header Cache-Control "public, no-transform, immutable";

    # Matikan log akses untuk menghemat I/O disk server
    access_log off;
    log_not_found off;

    # Pengamanan tambahan: Batasi hak akses eksekusi script
    # Mencegah eksekusi script PHP/JS nakal jika diunggah penyerang
    location ~* \.(php|pl|py|jsp|sh|cgi)$ {
        deny all;
    }
}
